<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orthodox Liturgies</title>

<style>

body{
font-family:Georgia,serif;
margin:0;
background:#fafafa;
}

h1{
text-align:center;
padding:20px 0;
}

.container{
display:flex;
min-height:100vh;
}

.sidebar{
width:220px;
background:#eee;
padding:20px;
box-sizing:border-box;
border-right:1px solid #ccc;
}

.sidebar a{
display:block;
margin-bottom:10px;
text-decoration:none;
font-weight:bold;
color:#333;
}

.sidebar a:hover{
text-decoration:underline;
}

.main{
flex:1;
padding:25px;
}

.section-title{
margin-top:40px;
font-size:1.3em;
border-bottom:1px solid #ccc;
padding-bottom:5px;
}

.entry{
margin:15px 0;
}

.speaker{
font-weight:bold;
margin-bottom:5px;
}

.speaker.priest{
color:#6b0000;
}

.speaker.people{
color:#003366;
}

.text-columns{
display:flex;
gap:25px;
}

.text-columns div{
flex:1;
}

.slavonic{
font-style:italic;
color:#555;
}

hr{
border:none;
border-top:1px solid #e0e0e0;
margin:18px 0;
}

.controls{
text-align:center;
margin-bottom:20px;
}

button,select{
padding:6px 12px;
margin:5px;
font-size:1em;
}

@media(max-width:800px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid #ccc;
}

.text-columns{
flex-direction:column;
}

}

</style>
</head>


<body>

<h1>Orthodox Liturgies</h1>

<div class="controls">

<label><strong>Select Liturgy:</strong></label>

<select id="liturgySelect" onchange="loadLiturgy(this.value)">
<option value="chrysostom.json">Divine Liturgy of St. John Chrysostom</option>
<option value="presanctified.json">Liturgy of the Presanctified Gifts</option>
</select>

<br>

<button onclick="setLanguage('side')">Side by Side</button>
<button onclick="setLanguage('english')">English</button>
<button onclick="setLanguage('slavonic')">Slavonic</button>

</div>

<div class="container">

<div class="sidebar" id="sidebar"></div>

<div class="main" id="content"></div>

</div>

<script>

let entries=[]
let currentLanguage="side"


function setLanguage(lang){
currentLanguage=lang
renderEntries()
}


function capitalize(str){
return str.charAt(0).toUpperCase()+str.slice(1).toLowerCase()
}


function loadLiturgy(file){

fetch(file+"?cacheBust="+Date.now())

.then(r=>r.json())

.then(data=>{

entries=data

generateSidebar()

renderEntries()

})

.catch(e=>{

document.getElementById("content").innerText="Error loading liturgy."

console.error(e)

})

}


function generateSidebar(){

const sidebar=document.getElementById("sidebar")

sidebar.innerHTML=""

const seen=new Set()

entries.forEach(entry=>{

if(!seen.has(entry.section)){

seen.add(entry.section)

const link=document.createElement("a")

link.href="#"+entry.section

link.textContent=entry.section_title || entry.section.replace(/_/g," ")

sidebar.appendChild(link)

}

})

}


function renderEntries(){

const container=document.getElementById("content")

container.innerHTML=""

let currentSection=""

entries.forEach(entry=>{

if(entry.section!==currentSection){

currentSection=entry.section

const header=document.createElement("div")

header.className="section-title"

header.id=currentSection

header.textContent=entry.section_title || entry.section.replace(/_/g," ")

container.appendChild(header)

}

const entryDiv=document.createElement("div")

entryDiv.className="entry"

const speaker=document.createElement("div")

speaker.className="speaker "+entry.speaker.toLowerCase()

speaker.textContent=capitalize(entry.speaker)

entryDiv.appendChild(speaker)

const columns=document.createElement("div")

columns.className="text-columns"

const eng=document.createElement("div")

eng.textContent=entry.english

const slav=document.createElement("div")

slav.className="slavonic"

slav.textContent=entry.slavonic

if(currentLanguage==="english"){

columns.appendChild(eng)

}

else if(currentLanguage==="slavonic"){

columns.appendChild(slav)

}

else{

columns.appendChild(eng)

columns.appendChild(slav)

}

entryDiv.appendChild(columns)

container.appendChild(entryDiv)

container.appendChild(document.createElement("hr"))

})

}


loadLiturgy("chrysostom.json")

</script>

</body>
</html>
